# =============================================================================
# Reverse proxy — domain-based routing for the GymFlow stack.
#
#   gymflow.io        -> web      (tenant client)
#   admin.gymflow.io  -> platform (platform admin)
#   api.gymflow.io    -> api      (NestJS backend)
#
# This serves plain HTTP on :80. For production TLS, terminate HTTPS here
# (mount certs + add `listen 443 ssl;` server blocks) or front this with a
# managed load balancer / Cloudflare. See DOCKER.md.
# =============================================================================

# Send `Connection: upgrade` only for actual WebSocket requests; keep-alive
# ("close" -> empty) for everything else.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

# Shared proxy settings.
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
# WebSocket / SSE upgrade support.
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        $connection_upgrade;

# Uploads: the API accepts up to 50mb bodies (branding/support attachments).
client_max_body_size 50m;

# ---- Tenant client: gymflow.io ----------------------------------------------
server {
    listen 80;
    server_name gymflow.io www.gymflow.io;

    location / {
        proxy_pass http://web:3000;
    }
}

# ---- Platform admin: admin.gymflow.io ---------------------------------------
server {
    listen 80;
    server_name admin.gymflow.io;

    location / {
        proxy_pass http://platform:3300;
    }
}

# ---- API: api.gymflow.io -----------------------------------------------------
server {
    listen 80;
    server_name api.gymflow.io;

    location / {
        proxy_pass http://api:5000;
    }
}

# ---- Default: unmatched hosts fall through to the tenant client -------------
server {
    listen 80 default_server;
    server_name _;

    location / {
        proxy_pass http://web:3000;
    }
}
